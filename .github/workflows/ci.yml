name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      # prisma generate (postinstall) не подключается к БД, но конфиг требует URL
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Включает валидацию контента (tests/content.test.ts) — dry-run сида
      - name: Test
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: senior_practice
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U app -d senior_practice"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://app:app@localhost:5433/senior_practice
      AUTH_SECRET: e2e-only-secret-not-for-production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Apply migrations and seed
        run: npx prisma migrate deploy && npm run seed

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
