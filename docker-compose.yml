services:
  postgres:
    image: postgres:17-alpine
    container_name: senior-practice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: senior_practice
    ports:
      # 5433 — на хосте уже занят 5432 локальным PostgreSQL
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d senior_practice"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:8
    container_name: senior-practice-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  mongo-data:
